<p-card>
  <div class="mb-8">
    <h2>Accounts Overview</h2>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Checking', balance: checkingTotal() }">
    </ng-container>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Saving', balance: savingTotal() }">
    </ng-container>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Credit', balance: creditTotal() }">
    </ng-container>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Loan', balance: loanTotal() }">
    </ng-container>
    <p-divider />
  </div>

  <div class="mb-5">
    <h2>Accounts Summary</h2>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Assets', balance: assets() }">
    </ng-container>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Liabilities', balance: liabilities() }">
    </ng-container>
    <ng-container
      *ngTemplateOutlet="accountSummary; context: { name: 'Total', balance: total() }">
    </ng-container>
    <p-divider />
  </div>
</p-card>


<ng-template #accountSummary let-name="name" let-balance="balance">
  <p-divider />
  <div class="flex justify-between items-center">
    <p>{{name}}</p>
    <p>{{balance | currency: 'USD' : 'symbol' : '1.2-2' }}</p>
  </div>

</ng-template>
