<div class="flex flex-col gap-4">
  <page-header backLink="/accounts" title="Account Transfer" />
  <p-card>
    <div class="flex flex-col gap-4 items-start justify-start">
      <p class="font-bold">From Account: </p>
      <account-radio-list
        [selectedAccount]="fromAccount?.accountId"
        (accountSelect)="setFromAccount($event)"
        radioButtonId="from-account-select"
        class="flex justify-between items-start gap-6" />

      <p class="font-bold">To Account: </p>
      <account-radio-list
        [selectedAccount]="toAccount?.accountId"
        (accountSelect)="setToAccount($event)"
        radioButtonId="to-account-select"
        class="flex justify-between items-start gap-6" />

      <p class="font-bold">Transaction Details</p>
      <transaction-form [transaction]="transaction" (submit)="createTransfer($event)" [showDescription]="false" />
    </div>
  </p-card>
</div>
