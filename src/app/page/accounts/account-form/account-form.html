<div class="place-items-center mt-20">
  <p-card>
    <h1 class="text-center m-4">Register</h1>
    <form [formGroup]="form" class="flex flex-col gap-8 justify-center items-center p-6">
      <p-floatlabel>
        <input
          pInputText
          type="text"
          id="account-name"
          formControlName="name"
        />
        <label for="account-name">Account Name</label>
      </p-floatlabel>
      <p-floatlabel>
        <p-input-number
          formControlName="balance"
          inputId="account-balance"
          mode="decimal"
          [minFractionDigits]="2"
          [maxFractionDigits]="2" />
        <label for="account-balance">Account Balance</label>
      </p-floatlabel>
      <p-floatlabel>
        <p-select
          formControlName="type"
          inputId="account-type"
          [options]="typeOptions"
          optionLabel="label"
          optionValue="value"
        />
        <label for="email">Account Type</label>
      </p-floatlabel>
      <p-button label="Register" (onClick)="onSubmit()" />
    </form>
  </p-card>

</div>
