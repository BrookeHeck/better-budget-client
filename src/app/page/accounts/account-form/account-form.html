<form [formGroup]="form" class="flex flex-col gap-8 justify-center items-center p-6">
  <p-floatlabel>
    <input
      pInputText
      type="text"
      id="account-name"
      formControlName="name"
      class="w-75"
    />
    <label for="account-name">Account Name</label>
  </p-floatlabel>
  <p-floatlabel>
    <p-input-number
      formControlName="balance"
      inputId="account-balance"
      mode="decimal"
      [minFractionDigits]="2"
      [maxFractionDigits]="2"
      class="w-75"
    />
    <label for="account-balance">Account Balance</label>
  </p-floatlabel>
  <p-floatlabel>
    <p-select
      formControlName="accountType"
      inputId="account-type"
      [options]="typeOptions"
      optionLabel="label"
      optionValue="value"
      class="w-75"
    />
    <label for="email">Account Type</label>
  </p-floatlabel>
  <p-button label="Save" (onClick)="onSubmit()" />
</form>
