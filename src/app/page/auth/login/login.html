<div class="place-items-center mt-20">
  <p-card>
    <h1 class="text-center m-4">Login</h1>

    <form [formGroup]="loginForm" class="flex flex-col gap-8 justify-center items-center p-6" >
      <p-floatlabel>
        <input
          pInputText
          id="email"
          formControlName="email"
          [required]="true"
          class="w-100"
        />
        <label for="email">Email</label>
      </p-floatlabel>
      <p-floatlabel>
        <input
          pInputText
          id="password"
          formControlName="password"
          [required]="true"
          class="w-100"
        />
        <label for="password">Password</label>
      </p-floatlabel>

      @if (loginError) {
        <p-message class="w-100">Incorrect email or password.</p-message>
      }

      <p-button label="Login" (onClick)="login()" />
    </form>
  </p-card>
</div>
