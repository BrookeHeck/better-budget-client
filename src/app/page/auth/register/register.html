<div class="place-items-center mt-20">
  <p-card>
    <h1 class="text-center m-4">Register</h1>
    <form [formGroup]="registerForm" class="flex flex-col gap-8 justify-center items-center p-6">
      <p-floatlabel>
        <input
          pInputText
          type="text"
          id="first-name"
          formControlName="firstName"
          class="w-100"
        />
        <label for="first-name">First Name</label>
      </p-floatlabel>
      <p-floatlabel>
        <input
          pInputText
          type="text"
          id="last-name"
          formControlName="lastName"
          class="w-100"
        />
        <label for="first-name">Last Name</label>
      </p-floatlabel>
      <p-floatlabel>
        <input
          pInputText
          type="text"
          id="email"
          formControlName="email"
          class="w-100"
        />
        <label for="email">Email</label>
      </p-floatlabel>
      <p-floatlabel>
        <input
          pInputText
          type="text"
          id="password"
          formControlName="password"
          class="w-100"
        />
        <label for="password">Password</label>
      </p-floatlabel>
      <p-button label="Register" (onClick)="register()" />
    </form>
  </p-card>

</div>
