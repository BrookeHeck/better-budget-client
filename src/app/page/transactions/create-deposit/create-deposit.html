<div class="flex flex-col gap-4">
  <page-header backLink="/transactions" title="Create Deposit" />
  <p-card>
    <div class="flex flex-col gap-4 items-start justify-start">
      <p class="font-bold">Select Account</p>
      <account-radio-list
        [selectedAccount]="accountId"
        (accountSelect)="setAccountId($event)"
        class="flex justify-between items-start gap-6" />
      <p class="font-bold">Transaction Details</p>
      <transaction-form [transaction]="transaction" (submit)="createDeposit($event)" />
    </div>
  </p-card>
</div>
