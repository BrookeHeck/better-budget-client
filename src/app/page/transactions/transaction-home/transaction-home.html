<div class="flex flex-col gap-4">
  <ng-template #headerEnd>
    <div>
      <p-button label="Create Expense" routerLink="/create-expense" [outlined]="true" severity="danger" [raised]="true" />
      <p-button label="Create Deposit" routerLink="/create-deposit" [outlined]="true" class="ml-4" [raised]="true" />
    </div>
  </ng-template>
  <page-header title="Transactions" [end]="headerEnd" />

  <transaction-table [transactions]="tableData()" />
</div>
