<form class="flex flex-col justify-center items-center gap-6" [formGroup]="form" (ngSubmit)="submitTransaction($event)">
  <p-floatlabel>
    <p-input-number
      formControlName="amount"
      inputId="transaction-amount"
      mode="decimal"
      [minFractionDigits]="2"
      [maxFractionDigits]="2"
      class="w-75"
      [min]="0"
    />
    <label for="transaction-amount">Transaction Amount</label>
  </p-floatlabel>
  @if (transactionType === TransactionType.EXPENSE || transactionType === TransactionType.DEPOSIT ) {
    <p-floatlabel>
      <textarea class="w-75" rows="3" cols="30" pTextarea formControlName="description" id="description"></textarea>
      <label for="description">Description</label>
    </p-floatlabel>
  }
  @if (transactionType === TransactionType.EXPENSE) {
    <p-floatlabel>
      <p-select
        [options]="budgetStore.activeCategories()"
        optionLabel="name"
        optionValue="budgetCategoryId"
        class="w-75"
        formControlName="categoryId"
      />
      <label for="category">Category</label>
    </p-floatlabel>
  }
  <p-floatlabel>
    <p-date-picker formControlName="dateOfTransaction" inputId="date" class="w-75" />
    <label for="date">Date of Transaction</label>
  </p-floatlabel>
  @if (buttonTemplate) {
    <ng-container
      *ngTemplateOutlet="buttonTemplate;">
    </ng-container>
  } @else {
    <p-button label="Submit"  type="submit" />
  }
</form>
