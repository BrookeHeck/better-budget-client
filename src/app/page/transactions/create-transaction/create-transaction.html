@if (!accountStore.loading()) {
  <div class="flex flex-col gap-4">
    <page-header title="Create Transaction" backLink="/transactions" />

    <p-card>
      <div class="card flex justify-center">
        <p-stepper [value]="1" class="basis-[50rem]">

          <p-step-list>
            <p-step [value]="1" [disabled]="!!createdTransaction">Select Account</p-step>
            <p-step [value]="2" [disabled]="!accountId || !!createdTransaction">Add Transaction Details</p-step>
            <p-step [value]="3">Add Transaction Items</p-step>
          </p-step-list>

          <p-step-panels>
            <p-step-panel [value]="1">
              <ng-template #content let-activateCallback="activateCallback">
                <account-radio-list
                  class="flex justify-between items-start ml-6 mr-12"
                  [accounts]="accounts()"
                  [selectedAccount]="accountId"
                  (accountSelect)="setSelectedAccount($event)" />
                <div class="flex pt-6 justify-end">
                  <p-button label="Next" icon="pi pi-arrow-right" iconPos="right" (onClick)="activateCallback(2)" [disabled]="!accountId" />
                </div>
              </ng-template>
            </p-step-panel>

            <p-step-panel [value]="2">
              <ng-template #content let-activateCallback="activateCallback">
                <form class="flex flex-col justify-center items-center gap-5" [formGroup]="detailForm">
                  <p-floatlabel>
                    <p-input-number
                      formControlName="amount"
                      inputId="transaction-amount"
                      mode="decimal"
                      [minFractionDigits]="2"
                      [maxFractionDigits]="2"
                      class="w-75"
                    />
                    <label for="transaction-amount">Transaction Amount</label>
                  </p-floatlabel>
                  <p-floatlabel>
                    <textarea class="w-75" rows="3" cols="30" pTextarea formControlName="description" id="description"></textarea>
                    <label for="description">Description</label>
                  </p-floatlabel>
                  <p-floatlabel>
                    <input pInputText type="text" class="w-75" id="category" formControlName="category">
                    <label for="category">Category</label>
                  </p-floatlabel>
                  <p-floatlabel>
                    <p-date-picker formControlName="dateOfTransaction" inputId="date" class="w-75" />
                    <label for="date">Date of Transaction</label>
                  </p-floatlabel>
                </form>

                <div class="flex pt-6 justify-end mb-4">
                  <p-button
                    label="Next"
                    icon="pi pi-arrow-right"
                    iconPos="right"
                    (onClick)="createTransaction(); activateCallback(3)"
                    [disabled]="!accountId" />
                </div>
              </ng-template>
            </p-step-panel>
            <p-step-panel [value]="3">
              <ng-template #content let-activateCallback="activateCallback">

                <div class="flex pt-6 justify-end">
                  <p-button label="Submit" icon="pi pi-arrow-right" iconPos="right" (onClick)="activateCallback(2)" />
                </div>
              </ng-template>
            </p-step-panel>
          </p-step-panels>
        </p-stepper>
      </div>
    </p-card>
  </div>
}
