<div class="flex flex-col gap-4">
  <ng-template #createButton>
    <p-button label="Create Recurring Payment" (onClick)="openCreateEditDialog()" />
  </ng-template>
  <page-header title="Recurring Payments" [end]="createButton" />
  <p-card>
    <p-select-button [options]="selectButtonOptions" [(ngModel)]="selectedOption" class="mb-6"/>
    @if (selectedOption === 'Table') {
      <recurring-payment-table
        [recurringPayments]="recurringPaymentStore.recurringPayments()"
        (edit)="openCreateEditDialog($event)"
      />
    } @else {
      <div>CALENDAR</div>
    }
  </p-card>
</div>

<p-dialog
  [(visible)]="showCreateEditDialog"
  (onHide)="closeCreateEditDialog()"
  [style]="{ width: '25rem', height: '35rem' }"
  [header]="recurringPayment.recurringPaymentId ? 'Edit Payment' : 'Create Payment' " >
  <recurring-payment-form [recurringPayment]="recurringPayment" (submit)="submitForm($event)" />
</p-dialog>
