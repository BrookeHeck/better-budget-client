<form [formGroup]="form" class="flex flex-col items-center gap-6 mt-5">
  <p-floatlabel>
    <input
      pInputText
      type="text"
      id="recurring-payment-name"
      formControlName="name"
      class="w-75"
    />
    <label for="recurring-payment-name">Name</label>
  </p-floatlabel>
  <p-floatlabel>
    <p-date-picker class="w-75" formControlName="nextPaymentDate" inputId="next-payment-date" />
    <label for="next-payment-date">Next Payment Date</label>
  </p-floatlabel>
  <p-floatlabel>
    <p-select
      class="w-75"
      inputId="payment-interval-select"
      [options]="paymentIntervalOptions"
      optionLabel="label"
      optionValue="value"
      formControlName="paymentInterval"
    />
    <label for="payment-interval-select">Payment Interval</label>
  </p-floatlabel>
  <p-floatlabel>
    <p-input-number
      class="w-75"
      formControlName="paymentAmount"
      inputId="payment-amount"
      mode="decimal"
      [minFractionDigits]="2"
      [maxFractionDigits]="2"
      [min]="0"
    />
    <label for="payment-amount">Payment Amount</label>
  </p-floatlabel>
  <div class="flex items-center justify-center gap-4">
    <p-checkbox formControlName="notifications"  [binary]="true" inputId="notifications" />
    <label for="notifications">Receive Notifications</label>
  </div>
  <p-button label="Submit" (onClick)="onSubmit()" />
</form>
