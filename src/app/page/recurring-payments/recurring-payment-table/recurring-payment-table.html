<p-table [value]="tableData()">
  <ng-template #header>
    <tr>
      <th>Name</th>
      <th>Next Payment Date</th>
      <th>Amount</th>
      <th>Interval</th>
      <th style="width: 12%"></th>
    </tr>
  </ng-template>
  <ng-template #body let-data>
    <tr>
      <td>{{ data.name }}</td>
      <td>{{ data.nextPaymentDate | date : 'yyyy-MM-dd' }}</td>
      <td>{{ data.paymentAmount | currency : 'USD' : 'symbol' : '1.2-2' }}</td>
      <td>{{ data.paymentInterval }}</td>
      <td>
        <div class="flex justify-end items-center gap-4">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [raised]="true"
            severity="secondary"
            (onClick)="edit.emit(data)"
          />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [raised]="true"
            severity="danger"
            (onClick)="delete.emit(data.recurringPaymentId)"
          />
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
