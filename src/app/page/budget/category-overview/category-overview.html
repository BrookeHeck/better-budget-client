<div class="flex flex-col gap-4">
  <p-card>
    <h3>Expenses</h3>
  </p-card>
  <p-card>
    <p-table
      [value]="budgetStore.categories()"
    >
      <ng-template #header>
        <tr>
          <th>Name</th>
          <th>Budget</th>
        </tr>
        <ng-template #body let-category>
          <tr>
            <td>{{category.name}}</td>
            <td>{{category.budget | currency : 'USD' : 'symbol' : '1.2-2'}}</td>
          </tr>
        </ng-template>
      </ng-template>
    </p-table>
    <p-button label="Create Category" styleClass="m-4" (onClick)="openCategoryDialog()" />
  </p-card>
</div>

<p-dialog
  [visible]="categoryDialogVisible"
  (onHide)="onCategoryDialogClose()"
  [header]="budgetCategory.budgetCategoryId ? 'Update Budget Category' : 'Create Budget Category'"
>
  <category-form [category]="budgetCategory" (submit)="submitCategoryForm($event)" />
</p-dialog>
