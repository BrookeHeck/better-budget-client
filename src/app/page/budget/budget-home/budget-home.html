<ng-template #monthSelect>
  <p-float-label>
    <p-date-picker
      [(ngModel)]="date"
      inputId="budget-date-select"
      view="month"
      dateFormat="mm/yy"
      [readonlyInput]="true"
      (onSelect)="onDateSelection()"
      [maxDate]="maxDate"
    />
    <label for="budget-date-select">Select Month/Year</label>
  </p-float-label>
</ng-template>

<ng-template #monthTitle>
  <h2>{{ date | date: 'MMMM yyyy' }}</h2>
</ng-template>

<div class="flex flex-col gap-4">
  <page-header title="Budget" [middle]="monthTitle" [end]="monthSelect"/>

  <div class="flex gap-4">
    <category-overview class="w-1/2" />
    <div class="w-1/2"></div>
  </div>
</div>
