<p-dialog [(visible)]="visible" [closable]="false">
  <div class="flex flex-col items-center justify-center gap-8">
    <div class="flex flex-col items-center justify-center gap-3">
      <p>{{text}}</p>
      @if (subText) {
        <p>{{subText}}</p>
      }
    </div>
    <div class="flex items-center justify-center gap-4 w-100">
      <p-button
        styleClass="w-50"
        [label]="cancelLabel"
        [severity]="cancelSeverity"
        [outlined]="true"
        (onClick)="confirm.emit(false)"/>
      <p-button
        styleClass="w-50"
        [label]="confirmLabel"
        [severity]="confirmSeverity"
        (onClick)="confirm.emit(true)" />
    </div>
  </div>
</p-dialog>
